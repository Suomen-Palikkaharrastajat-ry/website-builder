name: Build and Deploy (engine self-test)

# Builds the engine using its own template/ example content and deploys to
# this repo's GitHub Pages as a demo / staging environment.
# The real site lives in the content repo, which uses this engine as a tool.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Cache Elm packages
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('elm.json') }}
          restore-keys: elm-

      - name: Cache elm-pages codegen
        uses: actions/cache@v4
        with:
          path: .elm-pages
          key: elm-pages-${{ hashFiles('elm.json', 'package.json') }}
          restore-keys: elm-pages-

      - name: Install npm dependencies
        run: npm ci

      - name: Inject build metadata
        run: bash scripts/inject-build-meta.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}

      # CONTENT_DIR defaults to template/ — no fetch needed for self-test
      - name: Build elm-pages site
        run: npx elm-pages build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        run: bash scripts/smoke-test.sh
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
